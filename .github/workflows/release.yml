name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use latest stable Rust
        run: rustup update stable

      - name: Build tray launcher
        env:
          CARGO_BUILD_JOBS: 1
        run: cargo build --release --locked --manifest-path tray-launcher/Cargo.toml

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          $folder = "dist/Codex-Live-Viewer-Windows-x64"
          New-Item -ItemType Directory -Force -Path $folder | Out-Null
          Copy-Item "tray-launcher/target/release/codex-live-viewer-tray.exe" "$folder/Codex Live Viewer.exe"
          Copy-Item "codex-live-viewer.js", "README.md", "LICENSE" $folder
          Copy-Item "install-codex-notify-hook.bat" "$folder/install-codex-notify-hook.bat"
          Compress-Archive -Path $folder -DestinationPath "dist/Codex-Live-Viewer-Windows-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: dist/Codex-Live-Viewer-Windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tray dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Use latest stable Rust
        run: rustup update stable

      - name: Build tray launcher
        run: cargo build --release --locked --manifest-path tray-launcher/Cargo.toml

      - name: Create Linux ZIP
        run: |
          folder="dist/Codex-Live-Viewer-Linux-x64"
          mkdir -p "$folder"
          cp tray-launcher/target/release/codex-live-viewer-tray "$folder/codex-live-viewer-tray"
          cp codex-live-viewer.js README.md LICENSE "$folder/"
          chmod +x "$folder/codex-live-viewer-tray"
          cd dist
          zip -r Codex-Live-Viewer-Linux-x64.zip Codex-Live-Viewer-Linux-x64

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: dist/Codex-Live-Viewer-Linux-x64.zip

  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
