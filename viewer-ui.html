        var warning = document.createElement('div');
        warning.style.color = 'var(--yellow)';
        warning.style.marginBottom = '8px';
        warning.textContent = 'No process closely matches this task start time. Shared app-server processes can host several tasks; stopping one may affect all of them.';
        processPanel.appendChild(warning);
      }
      processes.forEach(function (process) {
        var row = document.createElement('div');
        row.className = 'process';
        var kill = document.createElement('button');
        kill.type = 'button';
        kill.className = 'kill-button';
        kill.textContent = 'STOP';
        kill.addEventListener('click', function () { openStopModal(process); });
        var description = document.createElement('span');
        description.className = 'mono';
        description.textContent = 'PID ' + process.pid + '  ' + process.name + '  ' + String(process.cmd || '').slice(0, 180);
        row.append(kill, description);
        processPanel.appendChild(row);
      });
    });

    window.addEventListener('resize', function () {
      applyPrefs();
      if (window.innerWidth > 760) document.body.classList.remove('mobile-side-open');
    });

    var events = new EventSource('/events');
    events.onopen = function () { setConnection('connected', 'Live updates connected'); };
    events.onerror = function () { setConnection('disconnected', 'Reconnecting\u2026'); };
    events.onmessage = function (message) {
      var data = JSON.parse(message.data);
      if (data.type === 'sessions') {
        var previousSelectedSession = currentSession();
        var previousSelectedStatus = previousSelectedSession ? previousSelectedSession.status : null;
        data.sessions.forEach(function (session) {
          var oldStatus = previousStatus[session.id];
          if (seeded && session.id !== selected && oldStatus !== session.status) unread.add(session.id);
          previousStatus[session.id] = session.status;
        });
        sessions = data.sessions;
        seeded = true;
        // forget dismissals for sessions that fell out of the tracked list
        if (sessions.length && (prefs.dismissed || []).length) {
          var kept = prefs.dismissed.filter(function (id) {
            return sessions.some(function (session) { return session.id === id; });
          });
          if (kept.length !== prefs.dismissed.length) { prefs.dismissed = kept; savePrefs(); }
        }
        if (selected && !sessions.some(function (session) { return session.id === selected; })) selected = null;
        followRunningSession(newestRunning());
        if (!selected && sessions.length) selectSession(sessions[0].id, false);
        followSelectedStatus(previousSelectedStatus);
        renderFilters();
        renderList();
        renderHeader();
      }
      if (data.type === 'snapshot') {
        store[data.session] = data.events;
        if (data.session === selected) renderFeed();
      }
      if (data.type === 'events') {
        var existing = store[data.session] = store[data.session] || [];
        existing.push.apply(existing, data.events);
        if (existing.length > 500) existing.splice(0, existing.length - 500);
        if (data.session === selected) {
          var shouldFollow = prefs.autoScroll && nearBottom();
          data.events.filter(eventVisible).forEach(function (event) {
            var key = String(selected || '') + '|' + prefs.view;
            var limit = renderLimits[key] || (prefs.view === 'raw' ? 80 : 160);
            var rendered = feedInner.querySelectorAll('.event');
            if (rendered.length >= limit && rendered.length) rendered[0].remove();
            feedInner.appendChild(createEvent(event));
          });
          if (shouldFollow) requestAnimationFrame(scrollToLatest);
          else jumpLatest.hidden = false;
        } else {
          unread.add(data.session);
          renderList();
        }
      }
    };

    var notifications = new EventSource('/notifications');
    notifications.onmessage = function (message) {
      try {
        var data = JSON.parse(message.data);
        if (data.type === 'job') refreshJobs();
      } catch (_) {}
    };

    applyPrefs();
    renderFilters();
    renderList();
    renderHeader();
    renderFeed();
    refreshJobs();
    window.setInterval(function () { renderList(); renderHeader(); }, 10000);
    window.setInterval(function () { if (prefs.filter === 'JOBS') refreshJobs(); }, 5000);
  </script>
</body>
</html>
